name: mobile
description: "Corvus mobile application."
version: 2.5.6+20

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  cupertino_icons: ^1.0.8
  device_preview: ^1.3.1
  google_fonts: ^8.1.0
  http: ^1.6.0
  get_it: ^8.0.0
  provider: ^6.0.0
  dropdown_button2: ^3.1.0
  flutter_launcher_icons: ^0.14.4
  flutter_svg: ^2.0.7
  image_picker: ^1.2.2
  flutter_secure_storage: ^9.0.0
  google_sign_in: ^6.2.1
  go_router: ^14.6.1
  flutter_local_notifications: ^17.1.2
  firebase_core: ^4.0.0
  firebase_messaging: ^16.0.0
  file_picker: ^8.0.7
  url_launcher: ^6.3.2
  dotted_border: ^3.1.0

  shared_preferences: any
  sqflite_sqlcipher: ^3.4.0
  path: ^1.9.1
  custom_refresh_indicator: ^4.0.1
  speech_to_text: ^7.4.0
  permission_handler: ^12.0.3
  animated_list_plus: ^0.5.2
  flutter_markdown: ^0.7.7+1
  flutter_tts: ^4.2.5
  image_cropper: ^12.2.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.3.0
  path_provider: ^2.1.6
  connectivity_plus: ^7.3.0
  lottie: ^3.5.1
  http_certificate_pinning: ^3.0.1
  flutter_pdfview: ^1.4.4
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo2.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/patterns/
    - assets/images/
    - assets/animations/

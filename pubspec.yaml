name: mobile
description: "Corvus mobile application."
version: 1.2.11+12

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  cupertino_icons: ^1.0.8
  device_preview: ^1.3.1
  google_fonts: ^8.1.0
  http: ^1.6.0
  get_it: ^8.0.0
  provider: ^6.0.0
  dropdown_button2: ^3.1.0
  flutter_launcher_icons: ^0.14.4
  flutter_svg: ^2.0.7
  image_picker: ^1.2.2
  flutter_secure_storage: ^9.0.0
  google_sign_in: ^6.2.1
  go_router: ^13.2.0
  flutter_local_notifications: ^17.1.2
  firebase_core: ^2.31.0
  firebase_messaging: ^14.9.1
  file_picker: ^8.0.7
  url_launcher: ^6.3.2
  dotted_border: ^3.1.0

  shared_preferences: any
  sqflite_sqlcipher: ^3.4.0
  path: ^1.9.1
  custom_refresh_indicator: ^4.0.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/logo.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
